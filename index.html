<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="hihglight-section">
            <div class="head-titel">
                <img src="./assets/icon/Rocket.svg" alt="Rocket yellow">
                <h2>Highlights</h2>
            </div>
            <div class="highlight-slider">
                <input type="radio" name="slider" value="one" checked>
                <input type="radio" name="slider" value="two"> 
                <input type="radio" name="slider" value="three">
                <input type="radio" name="slider" value="four">

                <div class="highlight-slider-wrapper">
                    <div class="slider-img element-one">
                        <img src="./assets/img/tropical-beach.jpg" alt="tropical-beach">
                    </div>
                    <div class="slider-img element-two">
                        <img src="./assets/img/scaninavia.jpg" alt="scaninavia">
                    </div>
                    <div class="slider-img elment-three">
                        <img src="./assets/img/pattaya-thailand.jpg" alt="pattaya-thailand">
                    </div>
                    <div class="slider-img element-four">
                        <img src="./assets/img/maunt-fuji.jpg" alt="maunt-fuji">
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
